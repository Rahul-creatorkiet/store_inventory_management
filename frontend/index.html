<!DOCTYPE html>
<html>
<head>
  <title>Store Inventory Management</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📦 Store Inventory Management</h1>

<div class="form">

<input id="productName" placeholder="Product Name">
<input id="productCode" placeholder="Product Code">
<input id="category" placeholder="Category">
<input id="supplierName" placeholder="Supplier">
<input id="quantityInStock" placeholder="Quantity">
<input id="unitPrice" placeholder="Price">

<button onclick="addProduct()">➕ Add Product</button>

</div>

<hr>

<button onclick="loadProducts()">Load Products</button>

<ul id="productList"></ul>

<script src="script.js"></script>

</body>
</html>
